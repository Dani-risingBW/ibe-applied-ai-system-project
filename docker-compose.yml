services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      # Persist bookings across container restarts
      - ./bookings.db:/app/bookings.db
      # Mount secrets (never baked into the image)
      - ./.env:/app/.env:ro
      - ./token.json:/app/token.json
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
